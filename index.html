<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
</head>
<body>
  <div class="background-shapes">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
  </div>

  <div class="container">
    <header class="header glass">
      <h1>Expense Tracker</h1>
      <p class="subtitle">Track your income, expenses, and stay on top of your finances</p>
    </header>

    <section class="summary-grid">
      <div class="summary-card glass income-card">
        <span class="summary-label">Total Income</span>
        <span class="summary-value" id="total-income">PKR 0.00</span>
      </div>
      <div class="summary-card glass expense-card">
        <span class="summary-label">Total Expenses</span>
        <span class="summary-value" id="total-expenses">PKR 0.00</span>
      </div>
      <div class="summary-card glass balance-card">
        <span class="summary-label">Balance</span>
        <span class="summary-value" id="balance">PKR 0.00</span>
      </div>
    </section>

    <main class="main-grid">
      <section class="form-section glass">
        <h2>Add Transaction</h2>
        <form id="transaction-form">
          <div class="form-group">
            <label for="type">Type</label>
            <div class="type-toggle">
              <button type="button" class="type-btn active" data-type="income">Income</button>
              <button type="button" class="type-btn" data-type="expense">Expense</button>
            </div>
          </div>

          <div class="form-group">
            <label for="description">Description</label>
            <input type="text" id="description" placeholder="e.g. Monthly salary" required>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="amount">Amount</label>
              <input type="number" id="amount" placeholder="0.00" min="0.01" step="0.01" required>
            </div>
            <div class="form-group">
              <label for="category">Category</label>
              <select id="category" required></select>
            </div>
          </div>

          <div class="form-group">
            <label for="date">Date</label>
            <input type="date" id="date" required>
          </div>

          <button type="submit" class="btn-submit">Add Transaction</button>
        </form>
      </section>

      <section class="transactions-section glass">
        <div class="transactions-header">
          <h2>Transactions</h2>
          <div class="filter-controls">
            <select id="filter-type">
              <option value="all">All Types</option>
              <option value="income">Income</option>
              <option value="expense">Expense</option>
            </select>
            <select id="filter-category">
              <option value="all">All Categories</option>
            </select>
          </div>
        </div>

        <ul id="transaction-list" class="transaction-list">
          <li class="empty-state">No transactions yet. Add your first one above!</li>
        </ul>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
